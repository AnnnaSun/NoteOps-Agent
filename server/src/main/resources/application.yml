spring:
  application:
    name: noteops-agent-server
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/noteops}
    username: ${DB_USERNAME:noteops}
    password: ${DB_PASSWORD:noteops}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health

noteops:
  ai:
    default-provider: OPENAI_COMPATIBLE
    request-timeout: PT80S
    routes:
      capture-analysis:
        endpoint: default
        model: deepseek-r1:8b
      search-enhancement:
        endpoint: default
        model: deepseek-r1:8b
    openai-compatible:
      # 这里要求上游兼容 OpenAI chat completions 协议。
      # 如果目标 API 不兼容该协议，应在网关层先做归一，或新增协议型 provider。
      default-endpoint: default
      endpoints:
        default:
          base-url: ${NOTEOPS_AI_BASE_URL:http://localhost:11434/v1}
          api-key: ${NOTEOPS_AI_API_KEY:${OPENAI_API_KEY:}}
          model: ${NOTEOPS_AI_MODEL:deepseek-r1:8b}
    ollama:
      base-url: http://localhost:11434
      model: deepseek-r1:8b
  capture:
    url:
      connect-timeout: PT5S
      read-timeout: PT15S
      max-response-bytes: 200000
      max-text-length: 4000
      user-agent: NoteOps-Agent/0.0.1
